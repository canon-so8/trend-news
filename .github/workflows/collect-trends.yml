name: Collect Trends

on:
  schedule:
    - cron: "0 2 * * 1-5"  # 平日 11:00 JST スタート → 遅延込みで12:00〜13:00着予定
  workflow_dispatch:  # 手動実行も可

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check if today is a Japanese holiday
        id: holiday
        run: |
          TODAY=$(TZ=Asia/Tokyo date +'%Y-%m-%d')
          HOLIDAYS=$(curl -sf https://holidays-jp.github.io/api/v1/date.json || echo "")
          if [ -z "$HOLIDAYS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ 祝日API取得失敗 → 安全のためスキップ: $TODAY"
          elif echo "$HOLIDAYS" | python3 -c "import sys,json; d=json.load(sys.stdin); h=d.get('$TODAY',''); print(h); exit(0 if not h else 1)"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "祝日のためスキップ: $TODAY"
          fi

      - uses: actions/checkout@v4
        if: steps.holiday.outputs.skip != 'true'

      - name: Set up Python
        if: steps.holiday.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.holiday.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Collect HF Papers
        if: steps.holiday.outputs.skip != 'true'
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
          DEEPL_ENABLED: ${{ vars.DEEPL_ENABLED }}
        run: python scripts/collect_hf_papers.py

      - name: Collect Daily News
        if: steps.holiday.outputs.skip != 'true'
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
          DEEPL_ENABLED: ${{ vars.DEEPL_ENABLED }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: python scripts/collect_daily_news.py

      - name: Commit and push
        if: steps.holiday.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet && echo "変更なし" || git commit -m "trend: $(date +'%Y-%m-%d %H:%M' -d '+9 hours')"
          git push

      - name: Notify Slack
        if: success() && steps.holiday.outputs.skip != 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python - <<'EOF'
          import json, urllib.request, os, time
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          token = os.environ.get("SLACK_BOT_TOKEN", "")
          if not token:
              print("SLACK_BOT_TOKEN未設定。スキップ。")
              exit(0)

          def post(text):
              channel = os.environ.get("SLACK_CHANNEL_ID", "")
              if not channel:
                  print("SLACK_CHANNEL_ID未設定。スキップ。")
                  return
              data = json.dumps({"channel": channel, "text": text}).encode("utf-8")
              req = urllib.request.Request(
                  "https://slack.com/api/chat.postMessage",
                  data=data,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json; charset=utf-8"}
              )
              print(json.loads(urllib.request.urlopen(req).read()).get("ok"))

          def wait_for_url(url, label):
              for i in range(30):
                  try:
                      if urllib.request.urlopen(url).getcode() == 200:
                          print(f'{label} ビルド完了確認（{(i+1)*10}秒）')
                          return True
                  except:
                      pass
                  print(f'{label} ビルド待機中... ({(i+1)*10}秒経過)')
                  time.sleep(10)
              print(f'{label} タイムアウト。そのまま送信します。')
              return False

          now = datetime.now(timezone(timedelta(hours=9)))
          date_str = now.strftime("%Y-%m-%d")

          daily_url = Path("/tmp/daily_url.txt").read_text().strip() if Path("/tmp/daily_url.txt").exists() else ""
          hf_url    = Path("/tmp/hf_url.txt").read_text().strip()    if Path("/tmp/hf_url.txt").exists()    else ""

          if daily_url:
              wait_for_url(daily_url, "ニュース")
              post(f"<{daily_url}|{date_str} : ニュース>")
          if hf_url:
              wait_for_url(hf_url, "トレンド論文")
              post(f"<{hf_url}|{date_str} : トレンド論文>")
          EOF
